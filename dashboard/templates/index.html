<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PhishDetect Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ==========================
       ✅ Core & Theme (Unchanged)
       ========================== */
    body {
      background: #0b0f14;
      color: #ffffff !important;
      font-family: "Segoe UI", sans-serif;
      /* Added to force single-screen fit */
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      margin: 0;
    }

    /* Navbar */
    .navbar {
      background: rgba(15, 20, 25, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid #00ffd1;
    }
    .navbar-brand {
      font-size: 1.3rem;
      letter-spacing: 0.5px;
    }
    .badge-teal {
      background-color: #00ffd1;
      color: #000;
      font-weight: 700;
      padding: 0.4rem 0.85rem;
      border-radius: 0.75rem;
    }

    /* Glass Card */
    .glass {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(0, 255, 209, 0.25);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.35);
    }

    /* Inputs */
    .form-control,
    textarea.form-control {
      background: rgba(0, 0, 0, 0.45) !important;
      border: 1px solid rgba(0, 255, 209, 0.35) !important;
      color: #ffffff !important;
      caret-color: #00ffd1 !important;
    }
    .form-control::placeholder,
    textarea.form-control::placeholder {
      color: rgba(255, 255, 255, 0.55) !important;
    }
    .form-control:focus,
    textarea.form-control:focus {
      background: rgba(0, 0, 0, 0.55) !important;
      color: #ffffff !important;
      border-color: #00ffd1 !important;
      box-shadow: 0 0 0 0.25rem rgba(0, 255, 209, 0.25) !important;
      outline: none !important;
    }

    /* Button */
    .btn-teal {
      background: linear-gradient(90deg, #00ffd1, #00bfa5);
      border: none;
      font-weight: 800;
      color: #000;
      border-radius: 12px;
      padding: 0.75rem;
      transition: 0.25s ease-in-out;
    }
    .btn-teal:hover {
      transform: scale(1.02);
      background: linear-gradient(90deg, #00bfa5, #00ffd1);
      box-shadow: 0px 0px 18px rgba(0, 255, 209, 0.55);
    }

    /* Section Title */
    .section-title {
      font-weight: 800;
      font-size: 1.1rem;
      color: #00ffd1;
      margin-bottom: 0.75rem;
      letter-spacing: 0.4px;
    }

    /* Result Wrapper */
    .result-wrapper {
      padding: 0;
      color: #ffffff !important;
      /* Added so ONLY the results scroll if content is massive, keeping page fixed */
      overflow-y: auto; 
      flex-grow: 1;
      padding-right: 5px; /* Prevent scrollbar overlap */
    }

    /* Custom Scrollbar for inner elements */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #00ffd1; border-radius: 10px; }

    /* ==========================
       ✅ Professional Result UI (Unchanged)
       ========================== */
    .result-card {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(0,255,209,0.25);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      color: #ffffff !important;
    }
    .result-card * { color: #ffffff !important; }

    .result-header { display: flex; justify-content: space-between; align-items: center; }
    .result-badge { padding: 10px 18px; border-radius: 14px; font-weight: 900; letter-spacing: 0.5px; font-size: 0.9rem; }
    .badge-phish { background: #ff3b3b; color: white !important; }
    .badge-legit { background: #00ffd1; color: black !important; }

    .divider { height: 1px; margin: 15px 0; background: rgba(255,255,255,0.08); }
    .section-block { margin-top: 14px; }
    
    .summary-box {
      background: rgba(0, 255, 209, 0.08);
      border: 1px solid rgba(0, 255, 209, 0.25);
      padding: 12px;
      border-radius: 12px;
      font-size: 0.95rem;
      color: #ffffff !important;
    }
    .score-box { font-size: 1.4rem; font-weight: 900; color: #00ffd1 !important; }

    /* Risk Pill */
    .risk-pill { padding: 8px 14px; border-radius: 14px; font-weight: 900; display: inline-block; }
    .risk-low { background: rgba(0,255,209,0.15); color:#00ffd1 !important; }
    .risk-mid { background: rgba(255,170,0,0.18); color:#ffb000 !important; }
    .risk-high { background: rgba(255,60,60,0.18); color:#ff3b3b !important; }

    /* Confidence */
    .confidence-wrap { display: flex; align-items: center; gap: 10px; }
    .confidence-bar { width: 240px; height: 14px; background: rgba(255,255,255,0.10); border-radius: 12px; overflow: hidden; }
    .confidence-fill { height: 100%; background: linear-gradient(90deg,#00ffd1,#00bfa5); }
    .confidence-label { font-weight: 800; color: #00ffd1 !important; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 12px; border-radius: 18px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.15); color: #ffffff !important; }
    .chip-teal { background: rgba(0,255,209,0.10); color: #00ffd1 !important; border-color: rgba(0,255,209,0.25); }
    .chip-warn { background: rgba(255,180,0,0.14); color: #ffb000 !important; border-color: rgba(255,180,0,0.25); }

    .breakdown-table { width: 100%; font-size: 0.95rem; border-collapse: collapse; color: #ffffff !important; }
    .breakdown-table td { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.07); color: #ffffff !important; }
    .warn-list { margin: 0; padding-left: 18px; color: #ffffff !important; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; color: #ffffff !important; }

    /* Wrapper for main content to constrain flex heights */
    .main-wrapper {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* Important for preventing flex children overflow */
    }

    footer {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.55);
      padding-top: 10px;
    }
    footer span { color: #00ffd1; font-weight: 700; }
  </style>
</head>

<body>

<nav class="navbar navbar-dark py-3 flex-shrink-0">
  <div class="container-fluid d-flex justify-content-between align-items-center px-4">
    <span class="navbar-brand fw-bold">PhishDetect Pro</span>
    <span class="badge badge-teal">Hybrid ML + Rules</span>
  </div>
</nav>

<div class="container-fluid px-4 py-4 main-wrapper">
  <div class="row g-4 h-100">

    <div class="col-lg-5 d-flex flex-column gap-4 h-100">
      
      <div class="card glass p-3 flex-shrink-0">
        <div class="card-body p-0 d-flex flex-column">
          <div class="section-title">🔗 URL Scanner</div>
          <input id="urlInput" class="form-control" placeholder="Paste URL (e.g., https://example.com/login)">
          <button class="btn btn-teal mt-3 w-100" onclick="scan('url')">Scan URL</button>
        </div>
      </div>

      <div class="card glass p-3 d-flex flex-column flex-grow-1" style="min-height: 0;">
        <div class="card-body p-0 d-flex flex-column h-100">
          <div class="section-title">📧 Email Scanner</div>
          <textarea id="emailInput" class="form-control flex-grow-1 mb-3" placeholder="Paste full email content here..." style="resize: none;"></textarea>
          <button class="btn btn-teal w-100" onclick="scan('email')">Scan Email</button>
        </div>
      </div>

    </div>

    <div class="col-lg-7 h-100">
      <div class="card glass p-3 h-100 d-flex flex-column">
        <div class="card-body p-0 d-flex flex-column h-100" style="min-height: 0;">
          <div class="section-title">✅ Detection Result</div>
          <div id="resultArea" class="result-wrapper">
            No scans yet.
          </div>
        </div>
      </div>
    </div>

  </div>
<br><br>
  <footer class="flex-shrink-0">
    © 2026 <span>PhishDetect Pro</span> | Thesis Project — Hybrid ML & Rule-Based Phishing Detection
  </footer>
</div>

<script src="/static/js/dashboard.js"></script>

</body>
</html>
