<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PhishDetect Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { width: 360px; background: #0b0f14; color: #ffffff !important; font-family: "Segoe UI", sans-serif; padding: 12px; }
    .title { font-size: 1.2rem; font-weight: 800; color: #00ffd1; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .glass { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(0, 255, 209, 0.25); border-radius: 14px; padding: 12px; margin-bottom: 12px; }
    .form-select { background: #000 !important; border: 1px solid #00ffd1 !important; color: #00ffd1 !important; border-radius: 10px; margin-bottom: 10px; }
    .form-control { background: rgba(0, 0, 0, 0.45) !important; border: 1px solid rgba(0, 255, 209, 0.35) !important; color: #fff !important; border-radius: 10px; }
    .btn-teal { background: linear-gradient(90deg, #00ffd1, #00bfa5); border: none; font-weight: 800; color: #000; border-radius: 10px; width: 100%; padding: 8px; margin-top: 10px; transition: 0.2s; }
    .btn-teal:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0, 255, 209, 0.4); }
    .result-card { display: none; background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(0, 255, 209, 0.25); border-radius: 14px; padding: 12px; }
    .result-badge { padding: 5px 12px; border-radius: 10px; font-weight: 900; font-size: 0.75rem; }
    .badge-phish { background: #ff3b3b; color: white; }
    .badge-legit { background: #00ffd1; color: black; }
    .badge-scan { background: #444; color: white; }
    .mini-box { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.08); }
    .mini-title { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
    .mini-value { font-size: 0.9rem; font-weight: 800; }
    .chip-warn { background: rgba(255,160,0,0.1); border: 1px solid #ffb000; color: #ffb000; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
  </style>
</head>
<body>
  <div class="title">🔍 PhishDetect Pro</div>
  
  <div class="glass">
    <label class="mini-title mb-1">CHOOSE SCAN TYPE</label>
    <select id="scanTypeSelector" class="form-select form-select-sm">
      <option value="url">Link / URL Scanner</option>
      <option value="email">Email Text Analysis</option>
    </select>

    <div id="urlSection">
      <input id="urlInput" class="form-control" placeholder="Paste URL here...">
      <button class="btn-teal" id="scanUrlBtn">Analyze Link</button>
    </div>

    <div id="emailSection" style="display:none;">
      <textarea id="emailInput" class="form-control" rows="3" placeholder="Paste email content..."></textarea>
      <button class="btn-teal" id="scanEmailBtn">Analyze Email</button>
    </div>
  </div>

  <div class="result-card" id="resultBox">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="fw-bold small">Analysis Report</span>
      <span id="resultBadge" class="result-badge badge-scan">WAITING</span>
    </div>
    
    <div class="progress mb-2" style="height: 6px; background: rgba(255,255,255,0.1);">
      <div id="confidenceBar" class="progress-bar bg-info" style="width:0%"></div>
    </div>
    
    <div class="row g-2">
      <div class="col-6"><div class="mini-box"><div class="mini-title">Score</div><div id="finalScore" class="mini-value">--</div></div></div>
      <div class="col-6"><div class="mini-box"><div class="mini-title">Trusted</div><div id="trustedDomain" class="mini-value">--</div></div></div>
    </div>

    <div class="mini-box mt-2">
      <div class="mini-title">🛡️ Risk Summary</div>
      <div id="riskLevel" class="mini-value mt-1" style="font-size: 0.8rem;">--</div>
      <div id="actionAdvice" class="text-white-50" style="font-size: 0.65rem;"></div>
    </div>
    
    <div id="ruleFlags" class="mt-2 d-flex flex-wrap gap-1"></div>
    <div id="warningsBox" class="mt-2 small text-danger" style="display:none;"><ul id="warningsList" class="ps-3 mb-0"></ul></div>
    
    <div class="mt-2 opacity-50 text-end" style="font-size: 0.6rem;">Scan Time: <span id="scanTimestamp">--</span></div>
  </div>

  <div class="text-center mt-2 opacity-50" style="font-size: 0.65rem;">API: 127.0.0.1:8000</div>
  <script src="popup.js"></script>
</body>
</html>
